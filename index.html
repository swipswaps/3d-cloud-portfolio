<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 代码集散地 – SwipSwaps</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #5effe0;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
            z-index: 10;
        }
        #debug-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 101;
            background: #0a0a14;
            border: 1px solid #5effe0;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            color: #5effe0;
            font-family: monospace;
            font-size: 10px;
        }
        #debug-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            width: 420px;
            max-height: 260px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            padding: 10px;
            font-size: 10px;
            font-family: monospace;
            color: #0f0;
            overflow-y: auto;
            z-index: 100;
            display: none;
            pointer-events: auto;
        }
        .export-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: #2e7d64;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            display: inline-block;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="info">
        🔮 3D 代码库星云<br>
        <span style="font-size: 10px;">单击: 锁定 | 双击: 打开 GitHub</span>
    </div>
    <div class="instruction">✨ 拖动旋转 | 滚动缩放</div>

    <!-- 搜索栏 -->
    <div style="position: fixed; top: 20px; left: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 60px;">
        <div style="display: flex; gap: 10px; align-items: center; max-width: 1200px; margin: 0 auto;">
            <input type="text" id="searchInput" placeholder="🔎 搜索代码片段..." style="flex:2; background:transparent; border:none; color:white; padding:8px; outline:none;">
            <select id="searchMode" style="background:#1a1a2e; color:white; border-radius:30px; padding:6px 12px;">
                <option value="readme">📄 本地搜索 README</option>
                <option value="github">🔍 GitHub API 搜索代码</option>
                <option value="semantic">🧠 语义化 AI 搜索</option>
                <option value="token">🔑 设置 GitHub 访问令牌</option>
            </select>
            <button id="searchBtn" style="background:#2e7d64; border-radius:50%; width:36px; height:36px;">🔍</button>
        </div>
    </div>

    <button id="debug-toggle">[+] 调试日志</button>
    <div id="debug-panel"></div>
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 200;">
        <span class="export-btn" onclick="window.open('/api/export/slop?format=json','_blank')">📊 导出 JSON</span>
        <span class="export-btn" onclick="window.open('/api/export/slop?format=csv','_blank')">📈 导出 CSV</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // 全局日志函数
        window.addLog = function(msg) {
            const timestamp = new Date().toLocaleTimeString();
            const logMsg = `[${timestamp}] 🐞 ${msg}`;
            console.log(logMsg);
            const panel = document.getElementById('debug-panel');
            if (panel) {
                const div = document.createElement('div');
                div.textContent = logMsg;
                panel.appendChild(div);
                panel.scrollTop = panel.scrollHeight;
                while (panel.children.length > 200) panel.removeChild(panel.children[0]);
            }
        };

        // 调试面板切换 (默认为折叠)
        const toggleBtn = document.getElementById('debug-toggle');
        const panel = document.getElementById('debug-panel');
        toggleBtn.onclick = () => {
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                toggleBtn.textContent = '[-] 调试日志';
            } else {
                panel.style.display = 'none';
                toggleBtn.textContent = '[+] 调试日志';
            }
        };
        panel.style.display = 'none';
        toggleBtn.textContent = '[+] 调试日志';

        window.addLog('🚀 正在启动应用');
        window.addLog('🧠 正在初始化 Three.js');

        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Three.js 场景设置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 10, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        // 拖拽日志 (带向量)
        let dragStartPos = null;
        controls.addEventListener('start', () => {
            window.addLog('🖱️ 开始拖拽');
            dragStartPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
        });
        controls.addEventListener('change', () => {
            if (dragStartPos) {
                const dx = camera.position.x - dragStartPos.x;
                const dy = camera.position.y - dragStartPos.y;
                const dz = camera.position.z - dragStartPos.z;
                const distance = Math.hypot(dx, dy, dz);
                window.addLog(`🖱️ 拖拽向量: dx=${dx.toFixed(2)}, dy=${dy.toFixed(2)}, dz=${dz.toFixed(2)}, 移动距离=${distance.toFixed(2)}`);
                dragStartPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            }
        });
        controls.addEventListener('end', () => {
            window.addLog('🖱️ 结束拖拽');
            dragStartPos = null;
        });

        window.addLog('✅ Three.js 场景已初始化');

        let repos = [];
        const cloudGroup = new THREE.Group();
        scene.add(cloudGroup);

        function lockRepository(name) {
            window.addLog(`🔒 已锁定: ${name}`);
        }

        async function loadRepos() {
            try {
                const res = await fetch('/api/repos');
                const data = await res.json();
                repos = data.repos || [];
                window.addLog(`✅ 从后端加载了 ${repos.length} 个代码库`);
            } catch (e) {
                window.addLog(`❌ 加载代码库失败: ${e.message}. 使用备用数据。`);
                repos = [
                    { name: 'swipswaps-portfolio-showcase' },
                    { name: 'threejs-cloud-viz' },
                    { name: 'semantic-search-engine' }
                ];
            }
            // 创建球体和标签
            repos.forEach(repo => {
                const geometry = new THREE.SphereGeometry(0.4, 16, 16);
                const material = new THREE.MeshStandardMaterial({ color: 0x5effe0 });
                const sphere = new THREE.Mesh(geometry, material);

                const phi = Math.acos(2 * Math.random() - 1);
                const theta = 2 * Math.PI * Math.random();
                const radius = 8;
                sphere.position.x = radius * Math.sin(phi) * Math.cos(theta);
                sphere.position.y = radius * Math.sin(phi) * Math.sin(theta);
                sphere.position.z = radius * Math.cos(phi);
                sphere.userData = { name: repo.name };

                const div = document.createElement('div');
                div.textContent = repo.name.length > 25 ? repo.name.substring(0, 22) + '...' : repo.name;
                div.style.cssText = 'color:#5effe0;font-size:12px;font-family:monospace;background:rgba(0,0,0,0.7);padding:4px 8px;border-radius:20px;border:1px solid #5effe0;cursor:pointer;white-space:nowrap;';
                
                div.onclick = (function(n) {
                    return function() {
                        window.addLog(`🖱️ 单击 - 代码库: ${n}`);
                        lockRepository(n);
                    };
                })(repo.name);
                
                div.ondblclick = (function(n) {
                    return function() {
                        window.addLog(`🖱️ 双击 - 正在打开: ${n}`);
                        window.open(`https://github.com/swipswaps/${n}`, '_blank');
                    };
                })(repo.name);
                
                div.onmouseenter = (function(n) {
                    return function() {
                        window.addLog(`🖱️ 悬停 - ${n}`);
                    };
                })(repo.name);

                const label = new CSS2DObject(div);
                label.position.copy(sphere.position);
                cloudGroup.add(sphere);
                cloudGroup.add(label);
            });
            window.addLog(`🎨 已创建 ${repos.length} 个标签`);
        }

        loadRepos();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addLog('🎨 应用已就绪 – 尽情单击、拖拽与悬停吧');

        // 搜索与 GitHub Token 逻辑
        const searchInput = document.getElementById('searchInput');
        const searchMode = document.getElementById('searchMode');
        const searchBtn = document.getElementById('searchBtn');

        searchBtn.onclick = () => {
            const query = searchInput.value.trim();
            const mode = searchMode.value;
            window.addLog(`🔍 正在搜索: "${query}"，模式: ${mode}`);
            if (mode === 'token') {
                const token = prompt('请输入您的 GitHub 个人访问令牌:');
                if (token) {
                    localStorage.setItem('github_token', token);
                    window.addLog('✅ 令牌已保存到 localStorage');
                } else {
                    window.addLog('⚠️ 已取消输入令牌');
                }
                searchMode.value = 'readme';
            } else if (mode === 'readme') {
                const results = repos.filter(r => r.name.toLowerCase().includes(query.toLowerCase()));
                window.addLog(`📄 找到 ${results.length} 个匹配的本地代码库`);
                alert(`找到 ${results.length} 个匹配的代码库`);
            } else {
                window.addLog(`静态页面中未实现 "${mode}" 模式`);
            }
        };
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
    </script>
</body>
</html>
