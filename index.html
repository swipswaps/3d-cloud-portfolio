<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Code Portfolio – SwipSwaps</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #5effe0;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
            z-index: 10;
        }
        #debug-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 101;
            background: #0a0a14;
            border: 1px solid #5effe0;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            color: #5effe0;
            font-family: monospace;
            font-size: 10px;
        }
        #debug-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            width: 450px;
            max-height: 260px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            padding: 10px;
            font-size: 10px;
            font-family: monospace;
            color: #0f0;
            overflow-y: auto;
            z-index: 100;
            display: none;
            pointer-events: auto;
        }
        .export-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: #2e7d64;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            display: inline-block;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="info">
        🔮 3D Repository Cloud<br>
        <span style="font-size: 10px;">Click: lock | Double-click: open GitHub</span>
    </div>
    <div class="instruction">✨ Drag to rotate | Scroll to zoom</div>

    <!-- Search Bar -->
    <div style="position: fixed; top: 20px; left: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 60px;">
        <div style="display: flex; gap: 10px; align-items: center; max-width: 1200px; margin: 0 auto;">
            <input type="text" id="searchInput" placeholder="🔎 Search code snippets..." style="flex:2; background:transparent; border:none; color:white; padding:8px; outline:none;">
            <select id="searchMode" style="background:#1a1a2e; color:white; border-radius:30px; padding:6px 12px;">
                <option value="readme">📄 Search READMEs (local)</option>
                <option value="github">🔍 Search code (GitHub API)</option>
                <option value="semantic">🧠 Semantic Search</option>
                <option value="token">🔑 Set GitHub Token</option>
            </select>
            <button id="searchBtn" style="background:#2e7d64; border-radius:50%; width:36px; height:36px;">🔍</button>
        </div>
    </div>

    <button id="debug-toggle">[+] Logs</button>
    <div id="debug-panel"></div>
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 200;">
        <span class="export-btn" onclick="window.open('/api/export/slop?format=json','_blank')">📊 JSON</span>
        <span class="export-btn" onclick="window.open('/api/export/slop?format=csv','_blank')">📈 CSV</span>
    </div>

    <script>
        // ---------- GLOBAL LOGGING ----------
        window.addLog = function(msg) {
            const timestamp = new Date().toLocaleTimeString();
            const logMsg = `[${timestamp}] 🐞 ${msg}`;
            console.log(logMsg);
            const panel = document.getElementById('debug-panel');
            if (panel) {
                const div = document.createElement('div');
                div.textContent = logMsg;
                panel.appendChild(div);
                panel.scrollTop = panel.scrollHeight;
                while (panel.children.length > 200) panel.removeChild(panel.children[0]);
            }
        };

        // Toggle debug panel (collapsed by default)
        const toggleBtn = document.getElementById('debug-toggle');
        const panel = document.getElementById('debug-panel');
        toggleBtn.onclick = () => {
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                toggleBtn.textContent = '[-] Logs';
            } else {
                panel.style.display = 'none';
                toggleBtn.textContent = '[+] Logs';
            }
        };
        panel.style.display = 'none';
        toggleBtn.textContent = '[+] Logs';

        window.addLog('🚀 Starting application');
        window.addLog('🧠 Loading Three.js...');

        // --------------------------------------------------------------
        // Load Three.js core and add‑ons from CDN (fallback to local if needed)
        // --------------------------------------------------------------
        function loadScript(src, onload) {
            const script = document.createElement('script');
            script.src = src;
            script.onload = onload;
            document.head.appendChild(script);
        }

        loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', () => {
            window.addLog('✅ Three.js core loaded');
            loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js', () => {
                loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js', () => {
                    window.addLog('✅ All extensions loaded');
                    initThree();
                });
            });
        });

        function initThree() {
            // --- Setup scene ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.008);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 10, 20);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            // Drag logging with vectors
            let dragStartPos = null;
            controls.addEventListener('start', () => {
                window.addLog('🖱️ DRAG START');
                dragStartPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            });
            controls.addEventListener('change', () => {
                if (dragStartPos) {
                    const dx = camera.position.x - dragStartPos.x;
                    const dy = camera.position.y - dragStartPos.y;
                    const dz = camera.position.z - dragStartPos.z;
                    const distance = Math.hypot(dx, dy, dz);
                    window.addLog(`🖱️ DRAG VECTOR: dx=${dx.toFixed(2)}, dy=${dy.toFixed(2)}, dz=${dz.toFixed(2)}, distance=${distance.toFixed(2)}`);
                    dragStartPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
                }
            });
            controls.addEventListener('end', () => {
                window.addLog('🖱️ DRAG END');
                dragStartPos = null;
            });

            window.addLog('✅ Scene ready');

            // --- Mock repositories (no API call) ---
            const repos = [
                { name: 'swipswaps-portfolio-showcase' },
                { name: 'threejs-cloud-viz' },
                { name: 'semantic-search-engine' },
                { name: 'github-token-manager' },
                { name: 'svelte-sqlite-integration' },
                { name: 'debug-panel-example' }
            ];

            const cloudGroup = new THREE.Group();
            scene.add(cloudGroup);

            function lockRepository(name) {
                window.addLog(`🔒 Locked: ${name}`);
            }

            repos.forEach(repo => {
                const geometry = new THREE.SphereGeometry(0.4, 16, 16);
                const material = new THREE.MeshStandardMaterial({ color: 0x5effe0 });
                const sphere = new THREE.Mesh(geometry, material);

                // Random spherical distribution
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = 2 * Math.PI * Math.random();
                const radius = 8;
                sphere.position.x = radius * Math.sin(phi) * Math.cos(theta);
                sphere.position.y = radius * Math.sin(phi) * Math.sin(theta);
                sphere.position.z = radius * Math.cos(phi);
                sphere.userData = { name: repo.name };

                const div = document.createElement('div');
                div.textContent = repo.name.length > 25 ? repo.name.substring(0, 22) + '...' : repo.name;
                div.style.cssText = 'color:#5effe0;font-size:12px;font-family:monospace;background:rgba(0,0,0,0.7);padding:4px 8px;border-radius:20px;border:1px solid #5effe0;cursor:pointer;white-space:nowrap;';

                // Click logging
                div.onclick = (function(n) {
                    return function() {
                        window.addLog(`🖱️ CLICK - Repository: ${n}`);
                        lockRepository(n);
                    };
                })(repo.name);

                // Double‑click logging
                div.ondblclick = (function(n) {
                    return function() {
                        window.addLog(`🖱️ DOUBLE CLICK - Opening: ${n}`);
                        window.open(`https://github.com/swipswaps/${n}`, '_blank');
                    };
                })(repo.name);

                // Hover logging
                div.onmouseenter = (function(n) {
                    return function() {
                        window.addLog(`🖱️ HOVER - ${n}`);
                    };
                })(repo.name);

                const label = new THREE.CSS2DObject(div);
                label.position.copy(sphere.position);
                cloudGroup.add(sphere);
                cloudGroup.add(label);
            });

            window.addLog(`🎨 Created ${repos.length} repository spheres`);

            // Add ambient light
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();

            window.addLog('🎨 App ready – click spheres, drag, hover');

            // --- Search & Token (placeholder, no backend) ---
            const searchInput = document.getElementById('searchInput');
            const searchMode = document.getElementById('searchMode');
            const searchBtn = document.getElementById('searchBtn');

            searchBtn.onclick = () => {
                const query = searchInput.value.trim();
                const mode = searchMode.value;
                window.addLog(`🔍 Search: "${query}" mode: ${mode}`);
                if (mode === 'token') {
                    const token = prompt('Enter your GitHub Personal Access Token:');
                    if (token) {
                        localStorage.setItem('github_token', token);
                        window.addLog('✅ Token saved (mock)');
                    } else {
                        window.addLog('⚠️ Token cancelled');
                    }
                    searchMode.value = 'readme';
                } else if (mode === 'readme') {
                    const results = repos.filter(r => r.name.toLowerCase().includes(query.toLowerCase()));
                    window.addLog(`📄 Found ${results.length} matching repos locally`);
                    alert(`Found ${results.length} matches`);
                } else {
                    window.addLog(`Mode "${mode}" not implemented in static demo`);
                }
            };
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
        }
    </script>
</body>
</html>
